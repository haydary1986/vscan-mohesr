services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seku-backend
    restart: unless-stopped
    volumes:
      - seku-data:/app/data
    environment:
      - GIN_MODE=release
    networks:
      - seku-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seku-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - seku-network

  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    profiles: ["cli"]
    entrypoint: ["vscan"]

volumes:
  seku-data:

networks:
  seku-network:
    driver: bridge
